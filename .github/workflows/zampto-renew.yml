name: Zampto Auto Renew

on:
  schedule:
    - cron: '14 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Core Repo
        uses: actions/checkout@v4
        with:
          repository: vipcd/zhuanshu-jiaoben
          token: ${{ secrets.ZAMPTO_PAT }}
          path: zampto-core

      - name: ⚙ 设置代理 (sing-box)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e

          ls -la zampto-core

          if [ ! -f "zampto-core/zampto-requirements.txt" ]; then
            echo "zampto-core/zampto-requirements.txt not found"
            exit 1
          fi

          python -m pip install --upgrade pip
          pip install -r zampto-core/zampto-requirements.txt

      - name: Run Zampto Script
        env:
          ZAMPTO_USER: ${{ secrets.ZAMPTO_EMAIL }}
          ZAMPTO_PASS: ${{ secrets.ZAMPTO_PASSWORD }}
          ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
          ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ZAMPTO_SERVER_ID: ${{ secrets.ZAMPTO_SERVER_ID }}
        run: |
          set -e

          # 1. 尝试从全局环境变量中提取代理
          RAW_PROXY=""
          if [ -n "$http_proxy" ]; then RAW_PROXY="$http_proxy";
          elif [ -n "$HTTP_PROXY" ]; then RAW_PROXY="$HTTP_PROXY";
          elif [ -n "$all_proxy" ]; then RAW_PROXY="$all_proxy";
          elif [ -n "$ALL_PROXY" ]; then RAW_PROXY="$ALL_PROXY";
          fi

          if [ -n "$RAW_PROXY" ]; then
            export ZAMPTO_PROXY=$(echo "$RAW_PROXY" | sed 's|http://||g; s|https://||g; s|socks5://||g; s|socks5h://||g')
            echo "✅ 成功从环境变量对接代理: $ZAMPTO_PROXY"
          
          # 2. 如果环境变量未共享，直接从 sing-box 配置文件中精准提取端口
          elif [ -f "sing-box-config.json" ]; then
            PORT=$(grep -oE '"listen_port"\s*:\s*[0-9]+|"port"\s*:\s*[0-9]+' sing-box-config.json | grep -oE '[0-9]+' | head -n 1)
            if [ -n "$PORT" ]; then
              export ZAMPTO_PROXY="127.0.0.1:$PORT"
              echo "✅ 成功从 sing-box 配置文件提取代理: $ZAMPTO_PROXY"
            fi
          fi

          # 3. 兜底策略：通过系统监听端口动态识别高端口
          if [ -z "$ZAMPTO_PROXY" ]; then
            PORT=$(ss -ltn | awk '{print $4}' | grep -oE '[0-9]+$' | grep -vE '^(22|53|80|443)$' | sort -u | head -n 1)
            if [ -n "$PORT" ]; then
              export ZAMPTO_PROXY="127.0.0.1:$PORT"
              echo "✅ 成功从系统监听端口识别代理: $ZAMPTO_PROXY"
            else
              echo "⚠️ 未能识别到任何代理端口，浏览器将尝试直连"
            fi
          fi

          if [ ! -f "zampto-core/zampto-renew.py" ]; then
            echo "zampto-core/zampto-renew.py not found"
            exit 1
          fi

          if [ -z "$ZAMPTO_USER" ]; then
            echo "Missing secret mapped to ZAMPTO_USER"
            exit 1
          fi

          if [ -z "$ZAMPTO_PASS" ]; then
            echo "Missing secret mapped to ZAMPTO_PASS"
            exit 1
          fi

          # 如果公开仓库根目录存在登录修复补丁，则先应用补丁；然后必须继续运行主脚本。
          if [ -f "apply_login_fix_v2.py" ]; then
            echo "Found apply_login_fix_v2.py in public repo root. Applying login patch..."
            cp apply_login_fix_v2.py zampto-core/
            cd zampto-core
            python apply_login_fix_v2.py
          elif [ -f "zampto-core/apply_login_fix_v2.py" ]; then
            echo "Found apply_login_fix_v2.py in private repo. Applying login patch..."
            cd zampto-core
            python apply_login_fix_v2.py
          else
            echo "No apply_login_fix_v2.py found. Running original zampto-renew.py directly."
            cd zampto-core
          fi

          echo "Starting Zampto main script..."
          python zampto-renew.py

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zampto-debug-files
          if-no-files-found: ignore
          path: |
            ssh-tunnel.log
            gost.log
            zampto-core/zampto_result.png
            zampto-core/*.png
            zampto-core/*.html
            zampto-core/zampto-renew.py.bak-*

      - name: Keep Only Latest 3 Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set +e

          gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --limit 100 --json databaseId,createdAt             --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].databaseId'             | while read -r RUN_ID; do
                if [ -n "$RUN_ID" ]; then
                  echo "Deleting workflow run: $RUN_ID"
                  gh api --method DELETE "/repos/$REPO/actions/runs/$RUN_ID" || true
                fi
              done
