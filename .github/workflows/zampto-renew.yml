name: Zampto Auto Renew

on:
  schedule:
    - cron: '14 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Core Repo
        uses: actions/checkout@v4
        with:
          repository: vipcd/zhuanshu-jiaoben
          token: ${{ secrets.ZAMPTO_PAT }}
          path: zampto-core

      # ➡️ 【核心替换】废除不稳定的第三方 Action 与被封的 SSH，改用原生命令安装官方 WARP
      - name: Start Cloudflare WARP & GOST Proxy
        run: |
          set -e

          echo "📥 正在配置 Cloudflare WARP 官方源..."
          sudo apt-get update && sudo apt-get install -y gpg lsb-release wget curl iproute2
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          echo "📥 正在安装 cloudflare-warp..."
          sudo apt-get update && sudo apt-get install cloudflare-warp -y

          echo "🚀 正在初始化 WARP 客户端 (注册并切换为本地 SOCKS5 代理模式)..."
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          echo "⏳ 等待 WARP 分配干净的网络节点..."
          sleep 8

          # 测试 WARP 自身的 SOCKS5 代理是否打通（默认运行在 40000 端口）
          WARP_IP=$(curl -s --connect-timeout 15 --socks5-hostname 127.0.0.1:40000 https://api.ipify.org || true)
          echo "🛰️ WARP 纯净出口 IP: $WARP_IP"

          if [ -z "$WARP_IP" ]; then
            echo "❌ WARP 代理隧道建立失败，请检查网络环境"
            exit 1
          fi

          echo "📥 正在获取最新版 GOST 并创建端口映射..."
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          if [ -z "$VERSION" ]; then
            VERSION="2.11.5"
          fi

          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost

          # 将 WARP 的 40000 端口桥接到 Python 脚本需要的 10809 HTTP 端口
          nohup ./gost -L http://:10809 -F socks5://127.0.0.1:40000 > gost.log 2>&1 &
          echo $! > gost.pid
          sleep 4

          if ! ss -ltn | grep -q ':10809'; then
            echo "❌ GOST 未能在 10809 端口正常监听"
            cat gost.log || true
            exit 1
          fi

          FINAL_IP=$(curl -s --connect-timeout 15 -x http://127.0.0.1:10809 https://api.ipify.org || true)
          echo "✅ 最终接入脚本的 HTTP 代理出口 IP: $FINAL_IP"

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          ls -la zampto-core
          if [ ! -f "zampto-core/zampto-requirements.txt" ]; then
            echo "zampto-core/zampto-requirements.txt not found"
            exit 1
          fi
          python -m pip install --upgrade pip
          pip install -r zampto-core/zampto-requirements.txt

      - name: Run Zampto Script
        env:
          ZAMPTO_USER: ${{ secrets.ZAMPTO_EMAIL }}
          ZAMPTO_PASS: ${{ secrets.ZAMPTO_PASSWORD }}
          ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
          ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ZAMPTO_SERVER_ID: ${{ secrets.ZAMPTO_SERVER_ID }}
          ZAMPTO_PROXY: 127.0.0.1:10809
        run: |
          set -e
          if [ ! -f "zampto-core/zampto-renew.py" ]; then
            echo "zampto-core/zampto-renew.py not found"
            exit 1
          fi
          if [ -z "$ZAMPTO_USER" ]; then
            echo "Missing secret mapped to ZAMPTO_USER"
            exit 1
          fi
          if [ -z "$ZAMPTO_PASS" ]; then
            echo "Missing secret mapped to ZAMPTO_PASS"
            exit 1
          fi

          if [ -f "apply_login_fix_v2.py" ]; then
            echo "Found apply_login_fix_v2.py in public repo root. Applying login patch..."
            cp apply_login_fix_v2.py zampto-core/
            cd zampto-core
            python apply_login_fix_v2.py
          elif [ -f "zampto-core/apply_login_fix_v2.py" ]; then
            echo "Found apply_login_fix_v2.py in private repo. Applying login patch..."
            cd zampto-core
            python apply_login_fix_v2.py
          else
            echo "No apply_login_fix_v2.py found. Running original zampto-renew.py directly."
            cd zampto-core
          fi

          echo "Starting Zampto main script..."
          python zampto-renew.py

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-archive@v4
        with:
          name: zampto-debug-files
          if-no-files-found: ignore
          path: |
            gost.log
            zampto-core/zampto_result.png
            zampto-core/*.png
            zampto-core/*.html
            zampto-core/zampto-renew.py.bak-*

      - name: Keep Only Latest 2 Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set +e
          gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --limit 100 --json databaseId,createdAt \
             --jq 'sort_by(.createdAt) | reverse | .[2:] | .[].databaseId' \
             | while read -r RUN_ID; do
                if [ -n "$RUN_ID" ]; then
                  echo "Deleting workflow run: $RUN_ID"
                  gh api --method DELETE "/repos/$REPO/actions/runs/$RUN_ID" || true
                fi
              done
