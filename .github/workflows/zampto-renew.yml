name: Zampto Auto Renew (Cookie + Restart)

on:
  schedule:
    - cron: '14 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Core Repo
        uses: actions/checkout@v4
        with:
          repository: vipcd/zhuanshu-jiaoben
          token: ${{ secrets.ZAMPTO_PAT }}
          path: zampto-core

      - name: ⚙ Setup Proxy (sing-box)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
          sudo apt-get update && sudo apt-get install -y curl wget tar
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:10809 -F socks5://127.0.0.1:1080 > gost.log 2>&1 &
          sleep 3

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          set -e
          if [ ! -f "zampto-core/zampto-requirements.txt" ]; then
            echo "requirements.txt not found"
            exit 1
          fi
          python -m pip install --upgrade pip
          pip install -r zampto-core/zampto-requirements.txt

      # ===== Cookie 登录 + 续期后重启 =====
      - name: Run Zampto Script
        env:
          ZAMPTO_COOKIES_JSON: ${{ secrets.ZAMPTO_COOKIES_JSON }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ZAMPTO_SERVER_ID: ${{ secrets.ZAMPTO_SERVER_ID }}
          ZAMPTO_PROXY: 127.0.0.1:10809
        run: |
          set -e
          cd zampto-core
          python zampto-renew_restart.py

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zampto-debug
          if-no-files-found: ignore
          path: |
            zampto-core/*.png
            zampto-core/*.html

      - name: Cleanup Old Runs
        if: always()
        run: |
          set +e
          gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" --limit 100 --json databaseId,createdAt --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].databaseId' | while read id; do
            [ -n "$id" ] && gh api --method DELETE "/repos/${{ github.repository }}/actions/runs/$id" || true
          done
