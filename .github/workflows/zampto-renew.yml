name: Zampto Auto Renew Cookie Proxy

on:
  schedule:
    - cron: '24 */3 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Core Repo
        uses: actions/checkout@v4
        with:
          repository: 'vipcd/zhuanshu-jiaoben'
          token: ${{ secrets.ZAMPTO_PAT }}
          path: zampto-core

      - name: Install Mihomo Core
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y jq gzip

          echo "下载 Mihomo 最新 Linux amd64 内核..."
          ASSET_URL=$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest   | jq -r '.assets[] | select(.name | test("mihomo-linux-amd64.*\.gz$")) | select(.name | test("compatible") | not) | .browser_download_url'   | head -n 1)

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "未找到普通 amd64 版本，尝试 compatible 版本..."
            ASSET_URL=$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest     | jq -r '.assets[] | select(.name | test("mihomo-linux-amd64-compatible.*\.gz$")) | .browser_download_url'     | head -n 1)
          fi

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ 未找到可用的 Mihomo Linux amd64 下载地址"
            exit 1
          fi

          curl -L "$ASSET_URL" -o mihomo.gz
          gunzip -f mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          mihomo -v

      - name: Convert V2rayN Node To Mihomo Config
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          set -e
          if [ -z "$PROXY_NODE" ]; then
            echo "❌ 未检测到 GitHub Secret: PROXY_NODE"
            echo "请把 v2rayN 里复制出来的单个节点链接放到 PROXY_NODE"
            exit 1
          fi

          cat > convert_node.py <<'PY'
          import os, json, base64, html
          from urllib.parse import urlsplit, parse_qs, unquote

          raw = html.unescape(os.environ.get("PROXY_NODE", "").strip())
          if not raw:
              raise SystemExit("PROXY_NODE 为空")
          raw = raw.splitlines()[0].strip()
          name = "v2rayn-node"
          if "#" in raw:
              try:
                  name = unquote(raw.rsplit("#", 1)[1]) or name
              except Exception:
                  pass

          def b64decode_text(s):
              s = s.strip()
              s += "=" * (-len(s) % 4)
              return base64.urlsafe_b64decode(s.encode()).decode(errors="ignore")

          def q(v):
              if isinstance(v, bool):
                  return "true" if v else "false"
              if isinstance(v, int):
                  return str(v)
              if v is None:
                  return "''"
              return json.dumps(str(v), ensure_ascii=False)

          def emit_proxy(proxy):
              proxy = dict(proxy)
              lines = ["proxies:", "  - name: " + q(proxy.pop("name", name))]
              order = ["type", "server", "port", "uuid", "password", "cipher", "alterId", "udp", "tls", "servername", "sni", "skip-cert-verify", "network", "flow", "client-fingerprint"]
              nested = []
              for key in order + [x for x in proxy.keys() if x not in order]:
                  if key not in proxy:
                      continue
                  value = proxy[key]
                  if isinstance(value, dict):
                      nested.append((key, value))
                  else:
                      lines.append(f"    {key}: {q(value)}")
              for key, data in nested:
                  lines.append(f"    {key}:")
                  for dk, dv in data.items():
                      if isinstance(dv, dict):
                          lines.append(f"      {dk}:")
                          for xk, xv in dv.items():
                              lines.append(f"        {xk}: {q(xv)}")
                      else:
                          lines.append(f"      {dk}: {q(dv)}")
              return lines

          def host_port(netloc):
              if "@" in netloc:
                  userinfo, hp = netloc.rsplit("@", 1)
              else:
                  userinfo, hp = "", netloc
              if hp.startswith("["):
                  host, rest = hp[1:].split("]", 1)
                  port = int(rest.lstrip(":") or 0)
              else:
                  host, port_s = hp.rsplit(":", 1) if ":" in hp else (hp, "0")
                  port = int(port_s or 0)
              return userinfo, host, port

          def common_transport(proxy, params):
              net = (params.get("type") or params.get("network") or [""])[0]
              security = (params.get("security") or [""])[0]
              sni = (params.get("sni") or params.get("servername") or [""])[0]
              fp = (params.get("fp") or params.get("client-fingerprint") or [""])[0]
              host = (params.get("host") or [""])[0]
              path = (params.get("path") or [""])[0]
              service = (params.get("serviceName") or params.get("service-name") or [""])[0]
              insecure = (params.get("allowInsecure") or params.get("insecure") or ["0"])[0]
              if security in ("tls", "reality"):
                  proxy["tls"] = True
              if sni:
                  proxy["servername"] = sni
                  proxy["sni"] = sni
              proxy["skip-cert-verify"] = str(insecure).lower() in ("1", "true", "yes")
              if fp:
                  proxy["client-fingerprint"] = fp
              if net:
                  proxy["network"] = net
              if net == "ws":
                  ws_opts = {}
                  if path:
                      ws_opts["path"] = path
                  if host:
                      ws_opts["headers"] = {"Host": host}
                  if ws_opts:
                      proxy["ws-opts"] = ws_opts
              elif net == "grpc":
                  grpc_opts = {}
                  if service:
                      grpc_opts["grpc-service-name"] = service
                  if grpc_opts:
                      proxy["grpc-opts"] = grpc_opts
              return proxy

          if raw.startswith("vmess://"):
              data = json.loads(b64decode_text(raw[len("vmess://"):]))
              name = data.get("ps") or name
              proxy = {
                  "name": name, "type": "vmess", "server": data.get("add"),
                  "port": int(data.get("port")), "uuid": data.get("id"),
                  "alterId": int(data.get("aid") or 0), "cipher": data.get("scy") or "auto", "udp": True,
              }
              if data.get("tls") == "tls":
                  proxy["tls"] = True
                  proxy["servername"] = data.get("sni") or data.get("host") or ""
                  proxy["skip-cert-verify"] = False
              if data.get("net"):
                  proxy["network"] = data.get("net")
              if data.get("net") == "ws":
                  ws_opts = {}
                  if data.get("path"):
                      ws_opts["path"] = data.get("path")
                  if data.get("host"):
                      ws_opts["headers"] = {"Host": data.get("host")}
                  if ws_opts:
                      proxy["ws-opts"] = ws_opts
              elif data.get("net") == "grpc" and data.get("path"):
                  proxy["grpc-opts"] = {"grpc-service-name": data.get("path")}

          elif raw.startswith(("trojan://", "vless://", "hysteria2://", "hy2://")):
              sp = urlsplit(raw)
              scheme = "hysteria2" if sp.scheme == "hy2" else sp.scheme
              params = parse_qs(sp.query)
              userinfo, server, port = host_port(sp.netloc)
              userinfo = unquote(userinfo)
              proxy = {"name": name, "type": scheme, "server": server, "port": port, "udp": True}
              if scheme == "trojan":
                  proxy["password"] = userinfo
                  common_transport(proxy, params)
              elif scheme == "vless":
                  proxy["uuid"] = userinfo
                  flow = (params.get("flow") or [""])[0]
                  if flow:
                      proxy["flow"] = flow
                  common_transport(proxy, params)
              elif scheme == "hysteria2":
                  proxy["password"] = userinfo
                  sni = (params.get("sni") or params.get("peer") or [""])[0]
                  insecure = (params.get("insecure") or params.get("allowInsecure") or ["0"])[0]
                  if sni:
                      proxy["sni"] = sni
                  proxy["skip-cert-verify"] = str(insecure).lower() in ("1", "true", "yes")

          elif raw.startswith("ss://"):
              sp = urlsplit(raw)
              params = parse_qs(sp.query)
              if "@" in sp.netloc:
                  userinfo, server, port = host_port(sp.netloc)
                  decoded = b64decode_text(userinfo) if ":" not in userinfo else unquote(userinfo)
                  cipher, password = decoded.split(":", 1)
              else:
                  decoded = b64decode_text(raw[len("ss://"):].split("#", 1)[0].split("?", 1)[0])
                  user, hp = decoded.rsplit("@", 1)
                  cipher, password = user.split(":", 1)
                  server, port_s = hp.rsplit(":", 1)
                  port = int(port_s)
              proxy = {"name": name, "type": "ss", "server": server, "port": port, "cipher": cipher, "password": password, "udp": True}
              if (params.get("plugin") or [""])[0]:
                  print("⚠️ 检测到 SS plugin 参数，当前自动转换可能无法完整处理插件节点。")
          else:
              raise SystemExit("❌ 暂不支持的节点格式。请使用 trojan:// vmess:// vless:// ss:// hysteria2:// hy2:// 单节点链接")

          config_lines = [
              "mixed-port: 10809", "allow-lan: false", "mode: rule", "log-level: info", "ipv6: false", "",
          ]
          config_lines.extend(emit_proxy(proxy))
          config_lines.extend([
              "", "proxy-groups:", "  - name: PROXY", "    type: select", "    proxies:", "      - " + q(name),
              "", "rules:", "  - MATCH,PROXY",
          ])
          open("mihomo-config.yaml", "w", encoding="utf-8").write("\n".join(config_lines) + "\n")
          print("✅ 已把 PROXY_NODE 转换为 Mihomo 配置")
          print("✅ 节点类型：", proxy.get("type"))
          print("✅ 节点名称：", name)
          print("✅ 本地代理：127.0.0.1:10809")
          PY
          python3 convert_node.py

      - name: Start Mihomo Proxy
        run: |
          set -e
          nohup mihomo -f mihomo-config.yaml > mihomo.log 2>&1 &
          echo $! > mihomo.pid

          echo "等待 Mihomo 监听 10809..."
          for i in {1..20}; do
            if ss -ltn | grep -q ':10809'; then
              echo "✅ Mihomo 已监听 127.0.0.1:10809"
              break
            fi
            sleep 1
          done

          if ! ss -ltn | grep -q ':10809'; then
            echo "❌ Mihomo 没有监听 10809，输出日志："
            cat mihomo.log || true
            exit 1
          fi

      - name: Test Proxy Access
        run: |
          echo "测试代理连通性，以下测试失败不会立即中断，方便查看脚本日志。"
          echo "测试 Google 204（走代理）："
          curl -I --max-time 20 -x http://127.0.0.1:10809 https://www.gstatic.com/generate_204 || true

          echo "测试 Zampto 官网（走代理）："
          curl -I -L --max-time 30 -x http://127.0.0.1:10809 https://zampto.net/ || true

          echo "测试 Zampto 续期页面（走代理）："
          curl -I -L --max-time 30 -x http://127.0.0.1:10809 "https://dash.zampto.net/server?id=9692" || true

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          set -e
          echo "检查私库文件："
          ls -la zampto-core

          if [ ! -f "zampto-core/zampto-requirements.txt" ]; then
            echo "❌ 没找到 zampto-core/zampto-requirements.txt"
            exit 1
          fi

          python -m pip install --upgrade pip
          pip install -r zampto-core/zampto-requirements.txt

      - name: Run Zampto Script
        env:
          ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ZAMPTO_SERVER_ID: ${{ secrets.ZAMPTO_SERVER_ID }}
          ZAMPTO_PROXY: "127.0.0.1:10809"
          ZAMPTO_COOKIES_JSON: ${{ secrets.ZAMPTO_COOKIES_JSON }}
        run: |
          set -e
          if [ ! -f "zampto-core/zampto-renew.py" ]; then
            echo "❌ 没找到 zampto-core/zampto-renew.py"
            exit 1
          fi

          cd zampto-core
          python zampto-renew.py

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zampto-debug-files
          if-no-files-found: ignore
          path: |
            mihomo.log
            zampto-core/zampto_result.png
            zampto-core/*.png
            zampto-core/*.html
