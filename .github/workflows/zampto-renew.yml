name: Zampto Auto Renew with Proxy

on:
  schedule:
    - cron: '24 */3 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      # 🌟【彻底恢复】不用任何稀疏拉取和 curl，用回你之前完全正常的标准整库拉取
      - name: Checkout Private Core Repo
        uses: actions/checkout@v4
        with:
          repository: 'vipcd/zhuanshu-jiaoben'
          token: ${{ secrets.ZAMPTO_PAT }}
          path: zampto-core

      - name: Install Hysteria2 Client Core
        env:
          TERM: xterm
        run: |
          curl -fsSL https://get.hy2.sh/ -o install_hy2.sh
          sudo bash install_hy2.sh
          rm install_hy2.sh

      - name: Parse Hysteria2 URI & Generate Config
        env:
          HYSTERIA2_NODE: ${{ secrets.HYSTERIA2_NODE }}
        run: |
          python3 -c "
          import os, json, re
          uri = os.environ.get('HYSTERIA2_NODE', '').strip()
          if not uri:
              print('❌ 未检测到配置的 HYSTERIA2_NODE')
              exit(1)
          
          clean_uri = uri.split('#')[0]
          if clean_uri.startswith('hysteria2://'):
              clean_uri = clean_uri[len('hysteria2://'):]
          
          if '@' in clean_uri:
              auth, rest = clean_uri.split('@', 1)
          else:
              auth, rest = '', clean_uri
              
          if '?' in rest:
              server, query_str = rest.split('?', 1)
          else:
              server, query_str = rest, ''
              
          sni = 'www.bing.com'
          insecure = True
          
          match_sni = re.search(r'sni=([^&]+)', query_str)
          if match_sni: 
              sni = match_sni.group(1)
              
          config = {
              'server': server,
              'auth': auth,
              'tls': {'sni': sni, 'insecure': insecure},
              'http': {'listen': '127.0.0.1:10809'},
              'socks5': {'listen': '127.0.0.1:10808'}
          }
          
          with open('hy2_config.json', 'w') as f:
              json.dump(config, f, indent=2)
          "

      - name: Start Hysteria2 Tunnel Backend
        run: |
          hysteria client -c hy2_config.json >/dev/null 2>&1 &
          sleep 4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 整库拉取下来后，这两个文件百分之百在原地，绝不会报找不到文件的错
      - name: Install dependencies
        run: |
          echo "检查私库文件："
          ls -la zampto-core

          if [ ! -f "zampto-core/zampto-requirements.txt" ]; then
            echo "❌ 没找到 zampto-core/zampto-requirements.txt"
            exit 1
          fi

          python -m pip install --upgrade pip
          pip install -r zampto-core/zampto-requirements.txt

      - name: Run Zampto Script
        env:
          # 仅传入单账号所需的 Secrets
          ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
          ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ZAMPTO_PROXY: "127.0.0.1:10809"
        run: |
          if [ ! -f "zampto-core/zampto-renew.py" ]; then
            echo "❌ 没找到 zampto-core/zampto-renew.py"
            exit 1
          fi

          cd zampto-core
          python zampto-renew.py
